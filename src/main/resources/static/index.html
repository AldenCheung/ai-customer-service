<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧商城 - 智能客服</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 700px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header .title {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.ai .msg-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .message.user .msg-avatar {
            background: #e8eaed;
            color: #5f6368;
        }

        .message .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.ai .bubble {
            background: #f1f3f4;
            color: #202124;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message .bubble .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #9aa0a6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e8eaed;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fafafa;
        }

        .chat-input-area textarea {
            flex: 1;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .chat-input-area textarea:focus {
            border-color: #667eea;
        }

        .chat-input-area button {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.15s, opacity 0.15s;
            flex-shrink: 0;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .welcome-message {
            text-align: center;
            color: #9aa0a6;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            font-size: 20px;
            color: #5f6368;
            margin-bottom: 8px;
        }

        .welcome-message p {
            font-size: 14px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .quick-actions button {
            padding: 8px 16px;
            border: 1px solid #dadce0;
            background: #fff;
            border-radius: 20px;
            font-size: 13px;
            color: #5f6368;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-actions button:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f8f7ff;
        }

        @media (max-width: 600px) {
            .chat-container {
                max-height: 100vh;
                border-radius: 0;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">&#129302;</div>
            <div>
                <div class="title">智慧商城客服</div>
                <div class="subtitle">AI 智能助手 | 随时为您服务</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>您好，欢迎来到智慧商城！</h2>
                <p>我是您的智能客服助手，有什么可以帮您的吗？</p>
                <div class="quick-actions">
                    <button onclick="sendQuickMessage('你们的退款政策是什么？')">退款政策</button>
                    <button onclick="sendQuickMessage('配送需要多长时间？')">配送时间</button>
                    <button onclick="sendQuickMessage('如何成为会员？')">会员权益</button>
                    <button onclick="sendQuickMessage('如何联系人工客服？')">联系客服</button>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <textarea id="messageInput" placeholder="请输入您的问题..." rows="1"
                      onkeydown="handleKeyDown(event)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
        </div>
    </div>

    <script>
        const sessionId = crypto.randomUUID();
        let isStreaming = false;

        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        messageInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendQuickMessage(text) {
            messageInput.value = text;
            sendMessage();
        }

        function addMessage(content, type) {
            // Remove welcome message if present
            const welcome = messagesContainer.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatarText = type === 'ai' ? '\u{1F916}' : '\u{1F464}';
            messageDiv.innerHTML = `
                <div class="msg-avatar">${avatarText}</div>
                <div class="bubble">${escapeHtml(content)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function addTypingIndicator() {
            const welcome = messagesContainer.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingMessage';
            messageDiv.innerHTML = `
                <div class="msg-avatar">\u{1F916}</div>
                <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setInputEnabled(enabled) {
            messageInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            isStreaming = !enabled;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            setInputEnabled(false);

            const typingDiv = addTypingIndicator();

            const encodedMessage = encodeURIComponent(message);
            const encodedSessionId = encodeURIComponent(sessionId);
            const url = `/api/chat/stream?message=${encodedMessage}&sessionId=${encodedSessionId}`;

            const eventSource = new EventSource(url);
            let responseText = '';
            let firstToken = true;

            eventSource.onmessage = function (event) {
                const data = event.data;

                if (data === '[DONE]') {
                    eventSource.close();
                    setInputEnabled(true);
                    messageInput.focus();
                    return;
                }

                if (firstToken) {
                    const bubble = typingDiv.querySelector('.bubble');
                    bubble.innerHTML = '';
                    firstToken = false;
                    typingDiv.removeAttribute('id');
                }

                responseText += data;
                const bubble = typingDiv.querySelector('.bubble');
                bubble.textContent = responseText;
                scrollToBottom();
            };

            eventSource.onerror = function () {
                eventSource.close();

                if (firstToken) {
                    const bubble = typingDiv.querySelector('.bubble');
                    bubble.textContent = '抱歉，连接出现问题，请稍后重试。';
                    typingDiv.removeAttribute('id');
                }

                setInputEnabled(true);
                messageInput.focus();
            };
        }
    </script>
</body>
</html>
